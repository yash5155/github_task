<!doctype html>
<html lang="en">
    <head>
        <title>To-Do Page</title>
    </head>
    <body>
        <div class="container">
            <h1>To-Do List</h1>
            <p>Add tasks using the input below.</p>

            <form action="/submit" method="POST">
                <input type="text" name="name" placeholder="Enter a todo item" required />
                <button type="submit">Add To-Do</button>
            </form>

            <ul>
                <li>Example task 1</li>
                <li>Example task 2</li>
            </ul>
        </div>
    </body>
</html>
