<!doctype html>
<html>
    <head>
        <title>Student Form</title>
    </head>
    <body>
        <h2>Student Form</h2>

        {% if error %}
        <p style="color: red">{{ error }}</p>
        {% endif %}

        <form action="/submit" method="POST">
            <label>Name:</label>
            <input type="text" name="name" required />

            <br /><br />

            <label>Email:</label>
            <input type="email" name="email" required />

            <br /><br />

            <button type="submit">Submit</button>
        </form>
    </body>
</html>
